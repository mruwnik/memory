[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Custom markers
markers =
    slow: marks tests as slow (creates database, uses containers, etc.)
    integration: marks tests that require external services
    db: marks tests that require database access

# Usage:
#   pytest            - Run fast tests only (default)
#   pytest --run-slow - Run all tests including slow ones
#   pytest -m slow --run-slow - Run only slow tests
#
# Parallel execution (requires pytest-xdist, in requirements-dev.txt):
#   pytest --run-slow -n 4 --dist loadfile  - ~2.3x faster (4:30 -> 2:00)
#
# --dist loadfile keeps every test from a file on the same worker, which
# avoids most cross-pollution from shared session/qdrant state (the
# default --dist load splits files across workers and triggers ~37
# failures). On this 10-core machine -n 8 was no faster than -n 4 —
# DB/qdrant container contention dominates past 4 workers.
#
# 4441 passed, 0 failed under -n 4 --dist loadfile as of 2026-05-08.

# Suppress common warnings
filterwarnings =
    ignore::DeprecationWarning:feedparser.*
    ignore::DeprecationWarning:discord.*
    ignore::sqlalchemy.exc.MovedIn20Warning
