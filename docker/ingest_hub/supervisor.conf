[supervisord]
nodaemon=true
loglevel=info
logfile=/dev/stdout
logfile_maxbytes=0
user=kb
pidfile=/dev/null

; Child stderr is merged into the stdout channel (redirect_stderr) rather than
; logged via /dev/stderr: the container's fd 2 is /dev/null (see Dockerfile) so
; that supervisord's logger can't die when the stdout pipe loses its reader.

[program:celery-beat]
command=celery -A memory.workers.ingest beat --pidfile= --schedule=/tmp/celerybeat-schedule
redirect_stderr=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
autorestart=true
startsecs=10

[program:discord-api]
command=python -m uvicorn memory.discord.api:app --host 0.0.0.0 --port %(ENV_DISCORD_COLLECTOR_PORT)s
redirect_stderr=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
autorestart=true
startsecs=10
